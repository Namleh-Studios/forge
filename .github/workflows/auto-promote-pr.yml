name: Auto-promote dev → main

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event != 'pull_request' }}
    uses: Namleh-Studios/.github/.github/workflows/reusable-auto-promote-pr.yml@main
